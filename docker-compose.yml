version: "3.8"

services:

  ############################################################
  # POSTGRES — BASE APP
  ############################################################
  postgres_app:
    image: pgvector/pgvector:pg16
    container_name: job_postgres_app
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_app_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  ############################################################
  # POSTGRES — AIRFLOW
  ############################################################
  postgres_airflow:
    image: postgres:16
    container_name: airflow_postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow -d airflow"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_network

  ############################################################
  # AIRFLOW INIT
  ############################################################
  airflow-init:
    build:
      context: ./airflow
    container_name: airflow_init
    depends_on:
      postgres_airflow:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
    command: >
      bash -c "airflow db migrate &&
      airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname ${AIRFLOW_ADMIN_FIRSTNAME} --lastname ${AIRFLOW_ADMIN_LASTNAME} --role Admin --email ${AIRFLOW_ADMIN_EMAIL}"
    restart: "no"
    networks:
      - app_network

  ############################################################
  # AIRFLOW WEBSERVER
  ############################################################
  airflow-webserver:
    build:
      context: ./airflow
    container_name: airflow_webserver
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__SECRET_KEY: ${AIRFLOW_SECRET_KEY}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}      
      ADZUNA_API_KEY: ${ADZUNA_API_KEY} 
      AIRFLOW__API__AUTH_BACKENDS: airflow.api.auth.backend.basic_auth
      AIRFLOW__API__ENABLE_EXPERIMENTAL_API: "True"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "True"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/config:/opt/airflow/config
      - ./scraper:/app/scraper
      - /var/run/docker.sock:/var/run/docker.sock
      - huggingface_cache:/root/.cache/huggingface   # ← ajouter cette ligne

    ports:
      - "8083:8080"
    command: webserver
    networks:
      - app_network

  ############################################################
  # AIRFLOW SCHEDULER
  ############################################################
  airflow-scheduler:
    build:
      context: ./airflow
    container_name: airflow_scheduler
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_airflow:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      POSTGRES_HOST: postgres_app
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      FT_CLIENT_ID: ${FT_CLIENT_ID}
      FT_CLIENT_SECRET: ${FT_CLIENT_SECRET}
      ADZUNA_APP_ID: ${ADZUNA_APP_ID}        # ← ajouter
      ADZUNA_API_KEY: ${ADZUNA_API_KEY} 
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./scraper:/app/scraper
      - /var/run/docker.sock:/var/run/docker.sock
      - huggingface_cache:/root/.cache/huggingface   # ← ajouter cette ligne

    command: scheduler
    networks:
      - app_network

  ############################################################
  # MINIO
  ############################################################
  minio:
    image: minio/minio
    container_name: job_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  ############################################################
  # SCRAPER
  ############################################################
  scraper:
    build:
      context: ./scraper/franceTravail
    image: scraper-francetravail:latest
    container_name: job_scraper
    environment:
      POSTGRES_HOST: postgres_app
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      FT_CLIENT_ID: ${FT_CLIENT_ID}
      FT_CLIENT_SECRET: ${FT_CLIENT_SECRET}
    depends_on:
      postgres_app:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - tools
    restart: "no"
    networks:
      - app_network

  ############################################################
  # DBEAVER
  ############################################################
  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: job_dbeaver
    ports:
      - "8082:8978"
    volumes:
      - dbeaver_data:/opt/cloudbeaver/workspace
    networks:
      - app_network

  ############################################################
  # FRONTEND
  ############################################################
  frontend:
    build:
      context: ./frontend
    container_name: job_frontend
    ports:
      - "3000:80"
    networks:
      - app_network

  ############################################################
  # BACKEND
  ############################################################
  backend:
    build:
      context: ./backend
    container_name: job_backend
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      MINIO_BUCKET: cvs
      POSTGRES_HOST: postgres_app
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5000:5000"
    depends_on:
      postgres_app:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - app_network

############################################################
# VOLUMES
############################################################
volumes:
  postgres_app_data:
  postgres_airflow_data:
  minio_data:
  dbeaver_data:
  huggingface_cache:   # ← ajouter cette ligne

############################################################
# NETWORKS
############################################################
networks:
  app_network:
    driver: bridge