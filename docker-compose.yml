
services:

  # -----------------------------------------------------------
  # BASE DE DONNÉES
  # -----------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg16
    container_name: job_postgres
    environment:
      POSTGRES_USER: jobuser
      POSTGRES_PASSWORD: motdepasse123
      POSTGRES_DB: job_intelligent
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # -----------------------------------------------------------
  # STOCKAGE FICHIERS (CVs + archives JSON)
  # -----------------------------------------------------------
  minio:
    image: minio/minio
    container_name: job_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------------
  # IMPORT KAGGLE — se lance une fois puis s'arrête
  # Lancez manuellement avec :
  # docker compose run --rm importer
  # -----------------------------------------------------------
  importer:
    build:
      context: ./importer
    container_name: job_importer
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ./importer/data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools          # Ne se lance PAS avec "docker compose up"
    restart: "no"      # Lancez manuellement une seule fois

  # -----------------------------------------------------------
  # SCRAPER FRANCE TRAVAIL — se lance puis s'arrête
  # Lancez manuellement avec :
  # docker compose run --rm scraper
  # -----------------------------------------------------------
  scraper:
    build:
      context: ./scraper/franceTravail
    container_name: job_scraper
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_USER}
      MINIO_SECRET_KEY: ${MINIO_PASSWORD}
      FT_CLIENT_ID: ${FT_CLIENT_ID}
      FT_CLIENT_SECRET: ${FT_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    profiles:
      - tools          # Ne se lance PAS avec "docker compose up"
    restart: "no"

volumes:
  postgres_data:
  minio_data: